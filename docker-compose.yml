# Full local stack: Postgres + FastAPI backend + Vite frontend.
# Simulated trading research only. Not financial advice.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_bot}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    ports:
      # Loopback-only: the backend/worker reach Postgres over the compose network
      # (host db:5432). Binding to 127.0.0.1 keeps it off the LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      # Loopback-only. Redis here is unauthenticated and the ARQ worker
      # deserializes job payloads, so it must not be reachable off-host. The
      # backend/worker connect over the compose network (redis:6379), not this
      # mapping — it exists only for local debugging.
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    # Hot-reload for local dev: source is mounted live (below) and uvicorn
    # watches it. No image rebuild needed when you edit app code.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-trading_bot}:${POSTGRES_PASSWORD:-trading_bot}@db:5432/${POSTGRES_DB:-trading_bot}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_DATA_DIR: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      # Alpaca PAPER credentials (Phase 3). Read from the root .env; empty by
      # default so the FakeBroker stays the credential-free default. The paper
      # base URL is hardcoded in app.brokers.alpaca — never set a live endpoint.
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      # Mount the backend source so uvicorn --reload sees edits live (deps are
      # installed at image level, so they survive this overlay).
      - ./backend:/app
      # The sample data lives at the repo root; mount it read-only for the loader.
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: ["arq", "app.jobs.worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-trading_bot}:${POSTGRES_PASSWORD:-trading_bot}@db:5432/${POSTGRES_DB:-trading_bot}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_DATA_DIR: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      # The daily paper-trading runner is an ARQ job in this worker — it needs the
      # Alpaca paper credentials. Paper base URL is hardcoded/guarded in code.
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      # Browser-side base URL — the browser reaches the backend on localhost.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
